# --- Booking Service Configuration ---
quarkus.application.name=booking-service

# HTTP
quarkus.http.port=8083

# Datasource (DevServices auto-starts PostgreSQL via Docker in dev mode)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.db-name=hotel_booking_db
quarkus.datasource.devservices.port=5483

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# REST Client for inter-service communication
quarkus.rest-client.inventory-api.url=http://localhost:8082
quarkus.rest-client.payment-api.url=http://localhost:8084
org.eclipse.microprofile.rest.client.propagateHeaders=Authorization

# CORS (allow frontend dev server)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# JWT verification (tokens are signed by user-service)
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://lumiere.com/issuer
quarkus.smallrye-jwt.enabled=true

# Allow unauthenticated access to the availability endpoint
quarkus.http.auth.permission.availability.paths=/api/bookings/availability
quarkus.http.auth.permission.availability.policy=permit
quarkus.http.auth.permission.availability.methods=GET

# --- Docker Profile ---
%docker.quarkus.datasource.devservices.enabled=false
%docker.quarkus.datasource.jdbc.url=jdbc:postgresql://booking-db:5432/hotel_booking_db
%docker.quarkus.datasource.username=hotel
%docker.quarkus.datasource.password=hotel_secret
%docker.quarkus.hibernate-orm.database.generation=update
%docker.quarkus.hibernate-orm.log.sql=false
%docker.quarkus.rest-client.inventory-api.url=http://inventory-service:8082
%docker.quarkus.rest-client.payment-api.url=http://payment-service:8084
%docker.quarkus.http.cors.origins=http://localhost:5173,http://localhost:3000

quarkus.smallrye-health.root-path=/api/health

%prod.quarkus.http.cors.origins=https://lumiere-estate.com
%prod.quarkus.http.cors=true


# Mailer configuration
%prod.quarkus.mailer.auth-methods=DIGEST-MD5,CRAM-SHA256,CRAM-SHA1,CRAM-MD5,PLAIN,LOGIN
%prod.quarkus.mailer.from=noreply@lumiere-estate.com
%prod.quarkus.mailer.host=smtp.sendgrid.net
%prod.quarkus.mailer.port=587
%prod.quarkus.mailer.start-tls=REQUIRED
%prod.quarkus.mailer.username=${MAIL_USER}
%prod.quarkus.mailer.password=${MAIL_PASSWORD}
%dev.quarkus.mailer.mock=true

%prod.quarkus.log.console.json=true
