# --- Payment Service Configuration ---
quarkus.application.name=payment-service

# HTTP
quarkus.http.port=8084

# Datasource (DevServices auto-starts PostgreSQL via Docker in dev mode)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.db-name=hotel_payment_db
quarkus.datasource.devservices.port=5484

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# REST Client
quarkus.rest-client.booking-api.url=http://localhost:8083

# CORS (allow frontend dev server)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# JWT verification (tokens are signed by user-service)
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://lumiere.com/issuer
quarkus.smallrye-jwt.enabled=true

# --- VNPay Configuration ---
vnpay.tmnCode=${VNPAY_TMN_CODE:B7QPL3VI}
vnpay.hashSecret=${VNPAY_HASH_SECRET:0TNE4L0YIRGZ7VNA17T01TC6MINHXIVD}
vnpay.payUrl=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.returnUrl=${VNPAY_RETURN_URL:http://localhost:8084/api/payments/vnpay-return}

# --- Docker Profile ---
%docker.quarkus.datasource.devservices.enabled=false
%docker.quarkus.datasource.jdbc.url=jdbc:postgresql://payment-db:5432/hotel_payment_db
%docker.quarkus.datasource.username=hotel
%docker.quarkus.datasource.password=hotel_secret
%docker.quarkus.hibernate-orm.database.generation=update
%docker.quarkus.hibernate-orm.log.sql=false
%docker.quarkus.rest-client.booking-api.url=http://booking-service:8083
%docker.quarkus.http.cors.origins=http://localhost:5173,http://localhost:3000

quarkus.smallrye-health.root-path=/api/health

%prod.quarkus.http.cors.origins=https://lumiere-estate.com
%prod.quarkus.http.cors=true

%prod.quarkus.log.console.json=true
