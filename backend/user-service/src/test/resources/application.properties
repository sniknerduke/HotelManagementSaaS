# Test configuration - disable auth, use H2
quarkus.smallrye-jwt.enabled=false
quarkus.http.auth.proactive=false

# Override all roles-allowed to permit
quarkus.security.jaxrs.deny-unannotated-endpoints=false

# H2 in-memory database
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.devservices.enabled=false
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=no-file
quarkus.hibernate-orm.log.sql=false

quarkus.smallrye-health.root-path=/api/health

%prod.quarkus.http.cors.origins=https://lumiere-estate.com
%prod.quarkus.http.cors=true

%prod.quarkus.log.console.json=true
%test.quarkus.oidc.facebook.client-secret=dummy
%test.quarkus.oidc.google.client-secret=dummy
%test.quarkus.oidc.google.client-id=dummy
%test.quarkus.oidc.facebook.client-id=dummy
